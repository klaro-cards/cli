services:

  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: enspirit/klarocli-claude
    container_name: klarocli-claude
    volumes:
      - ../..:/workspace
      - ./claude-data:/home/claude/.claude
      - ./claude-data/.claude.json:/home/claude/.claude.json
    env_file:
      - .env
    stdin_open: true
    tty: true
